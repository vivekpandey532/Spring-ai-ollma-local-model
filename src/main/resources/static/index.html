<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 16px; text-align: center; background: #16213e; border-bottom: 1px solid #0f3460; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; }
        .user-msg { align-self: flex-end; background: #0f3460; }
        .bot-msg { align-self: flex-start; background: #2a2a4a; }
        .input-area { display: flex; padding: 16px; gap: 10px; background: #16213e; border-top: 1px solid #0f3460; }
        #questionInput { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #0f3460; background: #1a1a2e; color: #eee; font-size: 16px; outline: none; }
        #questionInput:focus { border-color: #e94560; }
        #sendBtn { padding: 12px 24px; border-radius: 8px; border: none; background: #e94560; color: #fff; font-size: 16px; cursor: pointer; }
        #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; }
        .typing { opacity: 0.6; font-style: italic; }
        pre { background: #111; border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; }
        pre code { font-family: 'Courier New', monospace; font-size: 14px; color: #0f0; }
        code.inline { background: #111; padding: 2px 6px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 14px; color: #0f0; }
    </style>
</head>
<body>
    <div class="header"><h2>Ollama Chat</h2></div>
    <div class="chat-container" id="chat"></div>
    <div class="input-area">
        <input type="text" id="questionInput" placeholder="Ask a question..." autofocus>
        <button id="sendBtn" onclick="send()">Send</button>
    </div>
    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('questionInput');
        const btn = document.getElementById('sendBtn');

        input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

        async function send() {
            const question = input.value.trim();
            if (!question) return;
            addMessage(question, 'user-msg');
            input.value = '';
            btn.disabled = true;

            const typing = addMessage('Thinking...', 'bot-msg typing');
            try {
                const res = await fetch('/ask?question=' + encodeURIComponent(question));
                typing.innerHTML = formatMessage(await res.text());
                typing.classList.remove('typing');
            } catch (e) {
                typing.innerHTML = 'Error: ' + e.message;
                typing.classList.remove('typing');
            }
            btn.disabled = false;
            input.focus();
            chat.scrollTop = chat.scrollHeight;
        }

        function addMessage(text, cls) {
            const div = document.createElement('div');
            div.className = 'message ' + cls;
            div.innerHTML = formatMessage(text);
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function formatMessage(text) {
            // Replace ```lang...``` code blocks
            text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="lang-$1">$2</code></pre>');
            // Replace inline `code`
            text = text.replace(/`([^`]+)`/g, '<code class="inline">$1</code>');
            // Preserve newlines outside of pre blocks
            text = text.replace(/\n/g, '<br>');
            // Clean up <br> inside <pre>
            text = text.replace(/<pre><code([^>]*)>(.*?)<\/code><\/pre>/gs, (m, cls, code) => {
                return '<pre><code' + cls + '>' + code.replace(/<br>/g, '\n') + '</code></pre>';
            });
            return text;
        }
    </script>
</body>
</html>
